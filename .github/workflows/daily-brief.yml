name: Daily Brief
# NB: touched to nudge GitHub into indexing this workflow after the initial push.

on:
  schedule:
    # 10:00 Europe/Moscow (UTC+3, no DST) = 07:00 UTC.
    # If GitHub Actions cron ever moves off UTC, or Moscow changes its offset,
    # update this line accordingly — see spec §10.
    - cron: '0 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-brief
  cancel-in-progress: false

jobs:
  send-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm start
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REF_LINK: ${{ secrets.REF_LINK }}

      - name: Persist idempotency state
        run: |
          if [ -n "$(git status --porcelain state/last_sent_date.txt)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/last_sent_date.txt
            git commit -m "chore: mark brief sent for $(cat state/last_sent_date.txt)"
            git push
          fi
